# Agent System Configuration

# Arbitrary variables
variables:
  OPENAI_URL: "https://api.openai.com/v1"
  LOCAL_LLM_URL: "http://localhost:11434/v1"
  AWS_REGION: "us-east-1"

# Default model to use if not specified
default_model: "nova-2-lite"

# Model configurations
models:
  gpt-4:
    name: "gpt-4"
    provider: "openai"
    model_id: "gpt-4"
    api_key: "${env.OPENAI_API_KEY}"
    base_url: "${OPENAI_URL}"
    max_tokens: 4096
    temperature: 0.7
    soft_tools: false  # Use native tool calling
  
  intela-qwen:
    name: "Intela Qwen 80b next"
    provider: "openai"
    model_id: "qwen3-coder-next"
    api_key: "eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJzYW4iLCJleHAiOjE3OTg3NTc5OTl9.hDAO5yamyJRqrLyoP7DWFRqnxa9hbGpyAL7Ax72HzSqjh3caGETYk2WRt27ONZvL2E-1MWDLsB-gSz8vlIoVoA"
    base_url: "https://gpu1.itl-dev.com/v1"
    soft_tools: true  # Use soft tools (model may not support native tools)

  bedrock-claude:
    name: "Bedrock Claude"
    provider: "bedrock"
    # model_id: "anthropic.claude-3-sonnet-20240229-v1:0"
    model_id: "arn:aws:bedrock:us-east-1:348980842327:application-inference-profile/aw8bn9q7yhyr"
    max_tokens: 8192
    soft_tools: false  # Claude supports native tools
   
  claude-opus:
    name: "claude-opus"
    provider: "anthropic"
    model_id: "claude-3-opus-20240229"
    api_key: "${env.ANTHROPIC_API_KEY}"
    max_tokens: 4096
    temperature: 0.7
    soft_tools: false  # Claude supports native tools
   
  nova-2-lite:
    name: "Amazon Nova 2 Lite"
    provider: "bedrock"
    model_id: "us.amazon.nova-2-lite-v1:0"
    region: "${AWS_REGION}"
    aws_profile: "dev"  # Use dev profile for AWS SSO
    max_tokens: 4096
    temperature: 0.7
    soft_tools: true  # Use soft tools (may not support native tools)
    cache_points: false  # nova-2-lite doesn't support cache points

# Tool configurations
tools:
  bash:
    enabled: true
    default_timeout_ms: 120000
  read:
    enabled: true
  write:
    enabled: true
  edit:
    enabled: true
  glob:
    enabled: true
  grep:
    enabled: true
  task:
    enabled: true
  ask_user:
    enabled: true
  webfetch:
    enabled: true
  websearch:
    enabled: true
